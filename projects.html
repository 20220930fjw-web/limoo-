        /* ========== Page Hero ========== */
        .page-hero {
            min-height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 140px 48px 60px;
            overflow: hidden;
        }

        .page-hero-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        .page-hero-bg .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: orbFloat 12s ease-in-out infinite;
        }

        .page-hero-bg .orb-1 {
            width: 500px; height: 500px;
            background: rgba(233, 69, 160, 0.1);
            top: -10%; right: -10%;
            animation-delay: 0s;
        }

        .page-hero-bg .orb-2 {
            width: 400px; height: 400px;
            background: rgba(139, 92, 246, 0.08);
            bottom: -10%; left: -5%;
            animation-delay: -4s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        .page-hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 800px;
        }

        .page-hero-label {
            font-family: var(--font-display);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-magenta);
            margin-bottom: 16px;
        }

        .page-hero-title {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 20px;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-hero-desc {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        /* ========== Portfolio Section ========== */
        .portfolio-section {
            padding: 40px 48px 120px;
            position: relative;
            z-index: 2;
        }

        /* ========== Category Navigation ========== */
        .main-category-nav {
            max-width: 1200px;
            margin: 0 auto 40px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .main-cat-btn {
            position: relative;
            padding: 24px 20px;
            border-radius: 16px;
            background: var(--bg-card);
            border: 1px solid rgba(139,92,246,0.1);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .main-cat-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--gradient-main);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .main-cat-btn:hover,
        .main-cat-btn.active {
            border-color: rgba(139,92,246,0.3);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }

        .main-cat-btn.active::before {
            opacity: 0.15;
        }

        .main-cat-btn .icon {
            font-size: 2rem;
            margin-bottom: 8px;
            display: block;
        }

        .main-cat-btn .name {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
            position: relative;
        }

        .main-cat-btn .count {
            font-size: 0.8rem;
            color: var(--text-muted);
            position: relative;
        }

        /* ========== Sub Category Navigation ========== */
        .sub-category-nav {
            max-width: 1200px;
            margin: 0 auto 48px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .sub-cat-btn {
            padding: 10px 20px;
            border-radius: 100px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary);
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sub-cat-btn:hover {
            background: rgba(139,92,246,0.1);
            border-color: rgba(139,92,246,0.3);
            color: var(--text-primary);
        }

        .sub-cat-btn.active {
            background: var(--gradient-main);
            border-color: transparent;
            color: #fff;
        }

        .sub-cat-btn .count {
            margin-left: 6px;
            opacity: 0.7;
            font-size: 0.75rem;
        }

        /* ========== Projects Grid ========== */
        .projects-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
        }

        /* ========== Project Card ========== */
        .project-card {
            display: block;
            position: relative;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--bg-card);
            border: 1px solid rgba(139, 92, 246, 0.1);
            transition: var(--transition);
            cursor: pointer;
        }

        .project-card:hover {
            transform: translateY(-8px);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: var(--shadow-glow);
        }

        .project-card .card-image {
            width: 100%;
            aspect-ratio: 4/3;
            overflow: hidden;
        }

        .project-card .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .project-card:hover .card-image img {
            transform: scale(1.08);
        }

        .project-card .card-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 30%, rgba(10,10,15,0.9) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .project-card:hover .card-overlay {
            opacity: 1;
        }

        .project-card .card-view {
            position: absolute;
            bottom: 24px;
            left: 24px;
            right: 24px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .project-card:hover .card-view {
            opacity: 1;
            transform: translateY(0);
        }

        .card-view-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 100px;
            color: #fff;
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .card-view-btn:hover {
            background: var(--gradient-main);
            border-color: transparent;
        }

        .project-card .card-content {
            padding: 24px;
        }

        .project-card .card-category {
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-cyan);
            margin-bottom: 8px;
        }

        .project-card .card-title {
            font-family: var(--font-display);
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 8px;
            transition: var(--transition);
        }

        .project-card:hover .card-title {
            color: var(--accent-magenta);
        }

        .project-card .card-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .project-card .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .project-card .card-tag {
            padding: 4px 10px;
            border-radius: 100px;
            background: rgba(139, 92, 246, 0.08);
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* ========== Related CTA ========== */
        .related-cta {
            max-width: 1200px;
            margin: 80px auto 0;
            padding: 60px;
            border-radius: var(--radius-lg);
            background: var(--gradient-card);
            border: 1px solid rgba(139, 92, 246, 0.1);
            text-align: center;
        }

        .related-cta h3 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .related-cta p {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        /* ========== Responsive ========== */
        @media (max-width: 1024px) {
            .projects-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .main-category-nav {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .page-hero {
                padding: 120px 24px 40px;
            }

            .portfolio-section {
                padding: 20px 24px 80px;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .main-category-nav {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            .main-cat-btn {
                padding: 16px 12px;
            }

            .main-cat-btn .icon {
                font-size: 1.5rem;
            }

            .main-cat-btn .name {
                font-size: 0.85rem;
            }

            .sub-category-nav {
                gap: 8px;
                padding: 16px;
            }

            .sub-cat-btn {
                padding: 8px 14px;
                font-size: 0.8rem;
            }

            .related-cta {
                padding: 40px 24px;
            }
        }
    </style>

        // ========== State ==========
        let currentMainCategory = 'edu';
        let currentSubCategory = 'all';

        // ========== DOM Elements ==========
        const mainCategoryNav = document.getElementById('mainCategoryNav');
        const subCategoryNav = document.getElementById('subCategoryNav');
        const projectsGrid = document.getElementById('projectsGrid');

        // ========== Render Functions ==========
        function renderSubCategories(mainCat) {
            const data = categoryData[mainCat];
            if (!data) return;

            let html = `<button class="sub-cat-btn active" data-subcat="all">全部 <span class="count">${data.projects.length}</span></button>`;
            
            data.subCategories.forEach(sub => {
                html += `<button class="sub-cat-btn" data-subcat="${sub.id}">${sub.name} <span class="count">${sub.count}</span></button>`;
            });

            subCategoryNav.innerHTML = html;
            
            // Add event listeners
            subCategoryNav.querySelectorAll('.sub-cat-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    subCategoryNav.querySelectorAll('.sub-cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSubCategory = btn.dataset.subcat;
                    renderProjects(mainCat, currentSubCategory);
                });
            });
        }

        function renderProjects(mainCat, subCat = 'all') {
            const data = categoryData[mainCat];
            if (!data) return;

            const filteredProjects = subCat === 'all' 
                ? data.projects 
                : data.projects.filter(p => p.subCat === subCat);

            let html = '';
            filteredProjects.forEach((project, index) => {
                html += `
                    <a href="project-detail.html?id=${project.id}&cat=${mainCat}" class="project-card" style="animation-delay: ${index * 0.05}s">
                        <div class="card-image">
                            <img src="${project.image}" alt="${project.title}" loading="lazy">
                        </div>
                        <div class="card-overlay"></div>
                        <div class="card-view">
                            <div class="card-view-btn">查看详情 →</div>
                        </div>
                        <div class="card-content">
                            <div class="card-category">${data.name}</div>
                            <h3 class="card-title">${project.title}</h3>
                            <p class="card-desc">${project.desc}</p>
                            <div class="card-tags">
                                ${project.tags.map(tag => `<span class="card-tag">${tag}</span>`).join('')}
                            </div>
                        </div>
                    </a>
                `;
            });

            projectsGrid.innerHTML = html;

            // Trigger animation
            requestAnimationFrame(() => {
                projectsGrid.querySelectorAll('.project-card').forEach(card => {
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                });
            });
        }

        // ========== Initialize ==========
        function init() {
            // Check URL params
            const urlParams = new URLSearchParams(window.location.search);
            const catParam = urlParams.get('cat');
            
            if (catParam && categoryData[catParam]) {
                currentMainCategory = catParam;
            }

            // Set active main category
            mainCategoryNav.querySelectorAll('.main-cat-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === currentMainCategory);
            });

            // Render sub categories and projects
            renderSubCategories(currentMainCategory);
            renderProjects(currentMainCategory);

            // Main category click handlers
            mainCategoryNav.querySelectorAll('.main-cat-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const cat = btn.dataset.category;
                    if (cat === currentMainCategory) return;

                    mainCategoryNav.querySelectorAll('.main-cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    currentMainCategory = cat;
                    currentSubCategory = 'all';

                    renderSubCategories(cat);
                    renderProjects(cat);

                    // Update URL
                    history.pushState(null, '', `?cat=${cat}`);
                });
            });
        }

        init();
    </script>
