            height: 100%;

        // ========== Get URL Param ==========
        function getUrlParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        // ========== Get Projects by Category ==========
        function getProjectsByCategory(cat) {
            return Object.entries(projectsData)
                .filter(([_, p]) => p.category === cat)
                .map(([id, _]) => id);
        }

        // ========== Render Regular Project Page ==========
        function renderRegularProjectPage(project, id) {
            const galleryHTML = project.galleryType === 'longform'
                ? `<div class="longform-gallery">${project.images.map((img, i) => `
                    <div class="longform-item" onclick="openLightbox('${img}')">
                        <img src="${img}" alt="${project.title} - ${i + 1}" loading="lazy">
                        <div class="longform-number">${String(i + 1).padStart(2, '0')}</div>
                    </div>
                `).join('')}</div>`
                : `<div class="gallery-grid">${project.images.map((img, i) => `
                    <div class="gallery-item" onclick="openLightbox('${img}')">
                        <img src="${img}" alt="${project.title} - ${i + 1}" loading="lazy">
                    </div>
                `).join('')}</div>`;

            return `
                <!-- 顶部标题区 -->
                <div class="project-header">
                    <h1 class="project-main-title">${project.title}</h1>
                    <p class="project-meta-line">${project.year}｜${project.role}｜${project.categoryName}</p>
                </div>

                <!-- 项目信息区 -->
                <div class="project-info-row">
                    <div class="info-card">
                        <div class="info-icon">&#128100;</div>
                        <div class="info-label">客户</div>
                        <div class="info-value">${project.client}</div>
                    </div>
                    <div class="info-card">
                        <div class="info-icon">&#128197;</div>
                        <div class="info-label">时间</div>
                        <div class="info-value">${project.year}</div>
                    </div>
                    <div class="info-card">
                        <div class="info-icon">&#127991;</div>
                        <div class="info-label">类型</div>
                        <div class="info-value">${project.categoryName}</div>
                    </div>
                    <div class="info-card">
                        <div class="info-icon">&#127912;</div>
                        <div class="info-label">角色</div>
                        <div class="info-value">${project.role}</div>
                    </div>
                </div>

                <!-- 内容区域 -->
                <div class="project-content">
                    <div class="content-section">
                        <h2 class="section-title">项目描述</h2>
                        <p class="section-text">${project.description}</p>
                    </div>
                    <div class="content-section">
                        <h2 class="section-title">项目亮点</h2>
                        <ul class="highlight-list">
                            ${project.highlights.map(h => `
                                <li><span class="highlight-icon">&#10022;</span> ${h}</li>
                            `).join('')}
                        </ul>
                    </div>
                </div>

                <!-- 作品画廊 -->
                <div class="gallery-section">
                    <h2 class="section-title">作品展示</h2>
                    ${galleryHTML}
                </div>
            `;
        }

        // ========== Render Related Projects ==========
        function renderRelatedProjects(currentId, category) {
            const relatedIds = getProjectsByCategory(category).filter(pid => pid !== currentId).slice(0, 3);

            if (relatedIds.length === 0) return '';

            return `
                <section class="related-section">
                    <h2 class="section-title" style="padding-left: 0;">相关项目推荐</h2>
                    <div class="related-grid">
                        ${relatedIds.map(rid => {
                            const rp = projectsData[rid];
                            return `
                                <a href="project-detail.html?id=${rid}&cat=${rp.category}" class="related-card">
                                    <div class="rc-image"><img src="${rp.images[0]}" alt="${rp.title}" loading="lazy"></div>
                                    <div class="rc-content">
                                        <div class="rc-category">${rp.categoryName}</div>
                                        <h3 class="rc-title">${rp.title}</h3>
                                        <p class="rc-desc">${rp.description.substring(0, 60)}...</p>
                                    </div>
                                </a>
                            `;
                        }).join('')}
                    </div>
                </section>
            `;
        }

        // ========== Render Prev/Next Navigation ==========
        function renderPrevNext(currentId) {
            const allIds = Object.keys(projectsData);
            const currentIndex = allIds.indexOf(currentId);
            let pnHTML = '';

            if (currentIndex > 0) {
                const prev = projectsData[allIds[currentIndex - 1]];
                pnHTML += `<a href="project-detail.html?id=${allIds[currentIndex - 1]}&cat=${prev.category}" class="pn-card prev">
                    <div class="pn-image"><img src="${prev.images[0]}" alt="${prev.title}"></div>
                    <div>
                        <div class="pn-label">上一个项目</div>
                        <div class="pn-title">${prev.title}</div>
                    </div>
                </a>`;
            } else {
                pnHTML += '<div></div>';
            }

            if (currentIndex < allIds.length - 1) {
                const next = projectsData[allIds[currentIndex + 1]];
                pnHTML += `<a href="project-detail.html?id=${allIds[currentIndex + 1]}&cat=${next.category}" class="pn-card next">
                    <div class="pn-image"><img src="${next.images[0]}" alt="${next.title}"></div>
                    <div>
                        <div class="pn-label">下一个项目</div>
                        <div class="pn-title">${next.title}</div>
                    </div>
                </a>`;
            }

            return pnHTML ? `<div class="prev-next-nav">${pnHTML}</div>` : '';
        }

        // ========== Render Project Detail ==========
        function renderProject() {
            const id = getUrlParam('id') || 'youman-brand';
            const project = projectsData[id];

            if (!project) {
                document.getElementById('dynamicContent').innerHTML = `
                    <div class="project-header">
                        <h1 class="project-main-title">项目未找到</h1>
                        <p class="project-meta-line">请返回作品集页面查看其他项目</p>
                    </div>
                `;
                return;
            }

            // Update page title
            document.title = project.title + ' — HUGO | 冯江威品牌设计作品集';

            // Render content
            let contentHTML = renderRegularProjectPage(project, id);

            // Add related projects and navigation
            contentHTML += renderRelatedProjects(id, project.category);
            contentHTML += renderPrevNext(id);

            document.getElementById('dynamicContent').innerHTML = contentHTML;
        }

        // ========== Lightbox ==========
        function openLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            document.getElementById('lightboxImg').src = src;
            lightbox.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        document.getElementById('lightboxClose').addEventListener('click', () => {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        });

        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                e.currentTarget.classList.remove('open');
                document.body.style.overflow = '';
            }
        });

        // ========== Init ==========
        renderProject();
    </script>
