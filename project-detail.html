        /* ========== Detail Hero ========== */
        .detail-hero {
            position: relative;
            padding: 120px 48px 0;
            max-width: 1200px;
            margin: 0 auto;
        }

        .detail-breadcrumb {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .detail-breadcrumb a {
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .detail-breadcrumb a:hover {
            color: var(--accent-magenta);
        }

        .detail-breadcrumb .sep {
            color: var(--text-muted);
        }

        .detail-breadcrumb .current {
            color: var(--text-primary);
        }

        /* ========== Project Main Image ========== */
        .detail-main-image {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 48px;
            border: 1px solid rgba(139, 92, 246, 0.1);
        }

        .detail-main-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ========== Project Info Bar ========== */
        .detail-info-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 48px;
            padding: 32px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(139, 92, 246, 0.1);
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-cyan);
            margin-bottom: 8px;
        }

        .info-value {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ========== Project Content ========== */
        .detail-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 48px;
        }

        .detail-section {
            margin-bottom: 64px;
        }

        .detail-section-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.15);
        }

        .detail-description {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 2;
            max-width: 800px;
        }

        /* ========== Highlights ========== */
        .highlights-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 24px;
        }

        .highlight-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px 20px;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            border: 1px solid rgba(139, 92, 246, 0.08);
        }

        .highlight-icon {
            flex-shrink: 0;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--gradient-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #fff;
            margin-top: 2px;
        }

        .highlight-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* ========== Image Gallery ========== */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        /* ========== Poster Gallery (Vertical) ========== */
        .poster-gallery {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            padding-bottom: 16px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .poster-gallery::-webkit-scrollbar {
            height: 6px;
        }

        .poster-gallery::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.03);
            border-radius: 3px;
        }

        .poster-gallery::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.3);
            border-radius: 3px;
        }

        .poster-gallery::-webkit-scrollbar-thumb:hover {
            background: rgba(139, 92, 246, 0.5);
        }

        .poster-item {
            flex-shrink: 0;
            width: 320px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid rgba(139, 92, 246, 0.1);
            transition: var(--transition);
            cursor: pointer;
            scroll-snap-align: start;
        }

        .poster-item:hover {
            border-color: rgba(139, 92, 246, 0.3);
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .poster-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: var(--transition);
        }

        .poster-item:hover img {
            transform: scale(1.02);
        }

        .poster-label {
            padding: 12px 16px;
            background: var(--bg-card);
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
        }

        .gallery-item {
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid rgba(139, 92, 246, 0.08);
            transition: var(--transition);
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-4px);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: var(--shadow-glow);
        }

        .gallery-item img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            transition: var(--transition);
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item.wide {
            grid-column: span 2;
        }

        .gallery-item.tall {
            grid-row: span 2;
        }

        /* ========== Related Projects ========== */
        .related-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 48px 80px;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
            margin-top: 32px;
        }

        .related-card {
            display: block;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--bg-card);
            border: 1px solid rgba(139, 92, 246, 0.1);
            transition: var(--transition);
        }

        .related-card:hover {
            transform: translateY(-6px);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: var(--shadow-glow);
        }

        .related-card .rc-image {
            width: 100%;
            aspect-ratio: 16/10;
            overflow: hidden;
        }

        .related-card .rc-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .related-card:hover .rc-image img {
            transform: scale(1.05);
        }

        .related-card .rc-content {
            padding: 20px;
        }

        .related-card .rc-category {
            font-family: var(--font-display);
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-cyan);
            margin-bottom: 6px;
        }

        .related-card .rc-title {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 6px;
            transition: var(--transition);
        }

        .related-card:hover .rc-title {
            color: var(--accent-magenta);
        }

        .related-card .rc-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ========== Prev / Next Navigation ========== */
        .prev-next-nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 48px 80px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .pn-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 24px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(139, 92, 246, 0.1);
            transition: var(--transition);
        }

        .pn-card:hover {
            border-color: rgba(139, 92, 246, 0.3);
            transform: translateY(-2px);
        }

        .pn-card .pn-image {
            flex-shrink: 0;
            width: 80px;
            height: 60px;
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .pn-card .pn-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pn-card .pn-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-cyan);
            margin-bottom: 4px;
        }

        .pn-card .pn-title {
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .pn-card:hover .pn-title {
            color: var(--accent-magenta);
        }

        .pn-card.next {
            text-align: right;
            flex-direction: row-reverse;
        }

        /* ========== Lightbox ========== */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .lightbox.open {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: var(--radius-md);
        }

        .lightbox-close {
            position: absolute;
            top: 24px;
            right: 32px;
            font-size: 2rem;
            color: var(--text-primary);
            cursor: pointer;
            background: none;
            border: none;
            z-index: 10001;
        }

        /* ========== Responsive ========== */
        @media (max-width: 1024px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .related-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .detail-hero {
                padding: 100px 24px 0;
            }

            .detail-content {
                padding: 0 24px;
            }

            .related-section {
                padding: 0 24px 60px;
            }

            .prev-next-nav {
                padding: 0 24px 60px;
                grid-template-columns: 1fr;
            }

            .detail-info-bar {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
                padding: 24px;
            }

            .highlights-list {
                grid-template-columns: 1fr;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
            }

            .gallery-item.wide {
                grid-column: span 1;
            }

            .gallery-item.tall {
                grid-row: span 1;
            }

            .related-grid {
                grid-template-columns: 1fr;
            }

            .detail-main-image {
                aspect-ratio: 4/3;
            }
        }
    </style>
</head>

        // ========== Category Map ==========
        const categoryMap = {
            'edu': '教育品牌',
            'auto': '汽车品牌',
            'ecom': '电商品牌',
            'other': '其他项目'

        // ========== Get Project IDs by Category ==========
        function getProjectsByCategory(cat) {
            return Object.entries(projectsData)
                .filter(([_, p]) => p.category === cat)
                .map(([id, _]) => id);
        }

        // ========== Render Project Detail ==========
        function renderProject() {
            const id = getUrlParam('id');
            const project = projectsData[id];

            if (!project) {
                document.getElementById('mainImg').src = 'assets/edu/03.jpg';
                document.getElementById('breadcrumbTitle').textContent = '项目未找到';
                document.getElementById('infoClient').textContent = '-';
                document.getElementById('infoYear').textContent = '-';
                document.getElementById('infoCategory').textContent = '-';
                document.getElementById('infoRole').textContent = '-';
                document.getElementById('projectDesc').textContent = '未找到对应的项目信息，请返回作品集页面查看。';
                return;
            }

            // Update page title
            document.title = project.title + ' — HUGO | 冯江威品牌设计作品集';

            // Breadcrumb
            document.getElementById('breadcrumbTitle').textContent = project.title;

            // Main image
            document.getElementById('mainImg').src = project.images[0];
            document.getElementById('mainImg').alt = project.title;

            // Info bar
            document.getElementById('infoClient').textContent = project.client;
            document.getElementById('infoYear').textContent = project.year;
            document.getElementById('infoCategory').textContent = project.categoryName;
            document.getElementById('infoRole').textContent = project.role;

            // Description
            document.getElementById('projectDesc').textContent = project.description;

            // Highlights
            const highlightsList = document.getElementById('highlightsList');
            highlightsList.innerHTML = project.highlights.map(h => `
                <div class="highlight-item">
                    <div class="highlight-icon">&#10003;</div>
                    <div class="highlight-text">${h}</div>
                </div>
            `).join('');

            // Gallery
            const galleryGrid = document.getElementById('galleryGrid');
            const gallerySection = galleryGrid.parentElement;

            if (project.galleryType === 'poster' && project.posterImages) {
                // Poster gallery for vertical posters
                const posterLabels = ['实力 有认证', '守护 有答案', '颜值 有担当'];
                galleryGrid.className = 'poster-gallery';
                galleryGrid.innerHTML = project.posterImages.map((img, i) => {
                    return `<div class="poster-item" onclick="openLightbox('${img}')">
                        <img src="${img}" alt="${project.title} - ${posterLabels[i] || ''}" loading="lazy">
                        <div class="poster-label">${posterLabels[i] || '海报 ' + (i + 1)}</div>
                    </div>`;
                }).join('');

                // Add more images section below poster gallery
                const moreImages = project.images.filter(img => !project.posterImages.includes(img));
                if (moreImages.length > 0) {
                    const moreSection = document.createElement('div');
                    moreSection.className = 'detail-section reveal';
                    moreSection.style.marginTop = '48px';
                    moreSection.innerHTML = `<h2 class="detail-section-title">更多作品</h2><div class="gallery-grid">${moreImages.map((img, i) => {
                        return `<div class="gallery-item" onclick="openLightbox('${img}')">
                            <img src="${img}" alt="${project.title} - 更多${i + 1}" loading="lazy">
                        </div>`;
                    }).join('')}</div>`;
                    gallerySection.after(moreSection);
                }
            } else {
                galleryGrid.className = 'gallery-grid';
                galleryGrid.innerHTML = project.images.map((img, i) => {
                    let cls = '';
                    if (i === 0) cls = 'wide';
                    return `<div class="gallery-item ${cls}" onclick="openLightbox('${img}')">
                        <img src="${img}" alt="${project.title} - ${i + 1}" loading="lazy">
                    </div>`;
                }).join('');
            }

            // Related projects
            const relatedIds = getProjectsByCategory(project.category).filter(pid => pid !== id).slice(0, 3);
            const relatedGrid = document.getElementById('relatedGrid');
            relatedGrid.innerHTML = relatedIds.map(rid => {
                const rp = projectsData[rid];
                return `<a href="project-detail.html?id=${rid}&cat=${rp.category}" class="related-card">
                    <div class="rc-image"><img src="${rp.images[0]}" alt="${rp.title}" loading="lazy"></div>
                    <div class="rc-content">
                        <div class="rc-category">${rp.categoryName}</div>
                        <h3 class="rc-title">${rp.title}</h3>
                        <p class="rc-desc">${rp.description.substring(0, 60)}...</p>
                    </div>
                </a>`;
            }).join('');

            // Prev / Next
            const allIds = Object.keys(projectsData);
            const currentIndex = allIds.indexOf(id);
            const prevNextNav = document.getElementById('prevNextNav');
            let pnHTML = '';

            if (currentIndex > 0) {
                const prev = projectsData[allIds[currentIndex - 1]];
                pnHTML += `<a href="project-detail.html?id=${allIds[currentIndex - 1]}&cat=${prev.category}" class="pn-card prev">
                    <div class="pn-image"><img src="${prev.images[0]}" alt="${prev.title}"></div>
                    <div>
                        <div class="pn-label">上一个项目</div>
                        <div class="pn-title">${prev.title}</div>
                    </div>
                </a>`;
            } else {
                pnHTML += '<div></div>';
            }

            if (currentIndex < allIds.length - 1) {
                const next = projectsData[allIds[currentIndex + 1]];
                pnHTML += `<a href="project-detail.html?id=${allIds[currentIndex + 1]}&cat=${next.category}" class="pn-card next">
                    <div class="pn-image"><img src="${next.images[0]}" alt="${next.title}"></div>
                    <div>
                        <div class="pn-label">下一个项目</div>
                        <div class="pn-title">${next.title}</div>
                    </div>
                </a>`;
            }

            prevNextNav.innerHTML = pnHTML;
        }

        // ========== Lightbox ==========
        function openLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            document.getElementById('lightboxImg').src = src;
            lightbox.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        document.getElementById('lightboxClose').addEventListener('click', () => {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        });

        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                e.currentTarget.classList.remove('open');
                document.body.style.overflow = '';
            }
        });

        // ========== Init ==========
        renderProject();
    </script>
